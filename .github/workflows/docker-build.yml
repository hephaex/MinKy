name: Docker Build

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for Backend
      id: meta-backend
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-

    - name: Build Backend image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: false
        tags: ${{ steps.meta-backend.outputs.tags }}
        labels: ${{ steps.meta-backend.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        load: true

    - name: Push Backend image
      if: github.event_name != 'pull_request'
      continue-on-error: true
      run: |
        echo "Attempting to push image to GHCR..."
        docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:main || {
          echo "::warning::Push to GHCR failed. This may be due to package permissions."
          echo "To fix: Go to repository Settings > Actions > General > Workflow permissions"
          echo "and enable 'Read and write permissions'"
          exit 0
        }

  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for Frontend
      id: meta-frontend
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-

    - name: Build Frontend image
      uses: docker/build-push-action@v6
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: false
        tags: ${{ steps.meta-frontend.outputs.tags }}
        labels: ${{ steps.meta-frontend.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        load: true

    - name: Push Frontend image
      if: github.event_name != 'pull_request'
      continue-on-error: true
      run: |
        echo "Attempting to push image to GHCR..."
        docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:main || {
          echo "::warning::Push to GHCR failed. This may be due to package permissions."
          echo "To fix: Go to repository Settings > Actions > General > Workflow permissions"
          echo "and enable 'Read and write permissions'"
          exit 0
        }

  docker-compose-test:
    name: Docker Compose Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Create .env file
      run: |
        cat > .env << EOF
        POSTGRES_USER=minky_user
        POSTGRES_PASSWORD=test_password_for_ci_only
        POSTGRES_DB=minky_db
        DATABASE_URL=postgresql://minky_user:test_password_for_ci_only@db:5432/minky_db
        SECRET_KEY=test-secret-key-for-ci-only
        JWT_SECRET_KEY=test-jwt-secret-key-for-ci-only
        JWT_SECRET=test-jwt-secret-for-ci-only
        OPENSEARCH_INITIAL_ADMIN_PASSWORD=TestPassword123!
        FLASK_ENV=testing
        EOF

    - name: Build with docker compose
      run: docker compose build

    - name: Start services
      run: docker compose up -d

    - name: Wait for services to be healthy
      run: |
        timeout 60 bash -c 'until docker compose ps | grep -q "healthy"; do sleep 5; done' || true

    - name: Check service status
      run: docker compose ps

    - name: Show service logs
      if: always()
      run: docker compose logs

    - name: Stop services
      if: always()
      run: docker compose down -v
