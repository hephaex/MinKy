name: Issue Triage

on:
  schedule:
    # 1시간마다 실행
    - cron: '0 * * * *'
  issues:
    types: [opened]
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add needs-triage label to new issues
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.issue.number;

            // 새 이슈에 needs-triage 라벨 추가
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['status:needs-triage']
            });

            console.log(`Added needs-triage label to issue #${issueNumber}`);

      - name: Analyze and label issues
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'status:needs-triage',
              per_page: 10
            });

            for (const issue of issues) {
              const title = issue.title.toLowerCase();
              const body = (issue.body || '').toLowerCase();
              const content = title + ' ' + body;

              const labelsToAdd = [];

              // 문제 유형 분류
              if (content.includes('버그') || content.includes('오류') ||
                  content.includes('에러') || content.includes('안됨') ||
                  content.includes('bug') || content.includes('error')) {
                labelsToAdd.push('type:bug');
              } else if (content.includes('기능') || content.includes('추가') ||
                         content.includes('feature') || content.includes('새로운')) {
                labelsToAdd.push('type:feature');
              } else if (content.includes('개선') || content.includes('리팩토링') ||
                         content.includes('성능') || content.includes('improve')) {
                labelsToAdd.push('type:enhancement');
              } else if (content.includes('문서') || content.includes('readme') ||
                         content.includes('docs')) {
                labelsToAdd.push('type:docs');
              }

              // 우선순위 분류
              if (content.includes('긴급') || content.includes('장애') ||
                  content.includes('critical') || content.includes('서비스')) {
                labelsToAdd.push('priority:critical');
              } else if (content.includes('중요') || content.includes('보안') ||
                         content.includes('important') || content.includes('security')) {
                labelsToAdd.push('priority:high');
              } else {
                labelsToAdd.push('priority:medium');
              }

              // 영역 분류
              if (content.includes('backend') || content.includes('rust') ||
                  content.includes('api') || content.includes('서버')) {
                labelsToAdd.push('area:backend');
              } else if (content.includes('frontend') || content.includes('react') ||
                         content.includes('ui') || content.includes('화면')) {
                labelsToAdd.push('area:frontend');
              }

              // 라벨 추가
              if (labelsToAdd.length > 0) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: labelsToAdd
                });
              }

              // needs-triage 제거하고 pm-reviewed 추가
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                name: 'status:needs-triage'
              }).catch(() => {});

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['status:pm-reviewed']
              });

              // PM 분석 코멘트 추가
              const analysisComment = `## 🤖 PM Issue Analysis

### 요약
이 이슈가 자동으로 분석되었습니다.

### 분류
- **Labels**: ${labelsToAdd.join(', ') || 'None detected'}
- **Status**: PM Reviewed

### 다음 단계
1. 담당자 지정이 필요합니다
2. 상세 작업 분해가 필요할 수 있습니다

---
*이 분석은 GitHub Actions에 의해 자동 생성되었습니다.*`;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: analysisComment
              });

              console.log(`Processed issue #${issue.number}: ${issue.title}`);
            }

