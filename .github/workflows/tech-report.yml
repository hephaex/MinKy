name: Tech Report Generator

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  generate-report:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Tech Report
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const prNumber = pr.number;
            const prTitle = pr.title;
            const prBody = pr.body || '';

            const date = new Date().toISOString().split('T')[0];

            const slug = prTitle
              .toLowerCase()
              .replace(/[^a-z0-9]+/g, '-')
              .replace(/^-|-$/g, '')
              .substring(0, 30);

            const closingIssueMatch = prBody.match(/(?:closes?|fixes?|resolves?)\s*#(\d+)/i);
            const relatedIssue = closingIssueMatch ? closingIssueMatch[1] : null;

            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const additions = files.reduce((sum, f) => sum + f.additions, 0);
            const deletions = files.reduce((sum, f) => sum + f.deletions, 0);
            const changedFiles = files.map(f => `- \`${f.filename}\`: +${f.additions}/-${f.deletions}`).join('\n');

            const tags = [];
            if (files.some(f => f.filename.includes('rust') || f.filename.endsWith('.rs'))) tags.push('#rust');
            if (files.some(f => f.filename.includes('frontend') || f.filename.endsWith('.js') || f.filename.endsWith('.tsx'))) tags.push('#frontend');
            if (prTitle.toLowerCase().includes('fix')) tags.push('#bugfix');
            if (prTitle.toLowerCase().includes('feat')) tags.push('#feature');

            const issueRef = relatedIssue ? `#${relatedIssue}` : 'N/A';
            const prSummary = prBody.split('\n').slice(0, 10).join('\n') || 'No description';
            const tagList = tags.join(' ') || '#general';
            const issueLink = relatedIssue ? `2. [Issue #${relatedIssue}](https://github.com/${context.repo.owner}/${context.repo.repo}/issues/${relatedIssue})` : '';

            const report = [
              `# Tech Report: ${prTitle}`,
              '',
              `**PR**: #${prNumber}`,
              `**Issue**: ${issueRef}`,
              `**Date**: ${date}`,
              '**Author**: Technical Writer Agent (GitHub Actions)',
              '',
              '---',
              '',
              '## Overview',
              '',
              '### PR Summary',
              prSummary,
              '',
              '---',
              '',
              '## Changes',
              '',
              `### Changed Files (${files.length})`,
              changedFiles,
              '',
              '### Statistics',
              `- **Lines added**: +${additions}`,
              `- **Lines removed**: -${deletions}`,
              '',
              '---',
              '',
              '## Learning Points',
              '',
              '### 1. Key Takeaways',
              '- **What**: Analyze the main changes in this PR',
              '- **Why**: Improve code quality and maintainability',
              '- **Apply**: Reference for similar problems',
              '',
              '### 2. Code Patterns',
              '- **What**: Review code patterns used',
              '- **Why**: Maintain consistent code style',
              '- **Apply**: Reference for new feature implementation',
              '',
              '### 3. Test Strategy',
              '- **What**: Check test additions/modifications',
              '- **Why**: Prevent regressions',
              '- **Apply**: Reference for similar feature testing',
              '',
              '---',
              '',
              '## References',
              '',
              '### Related Links',
              `1. [PR #${prNumber}](${pr.html_url})`,
              issueLink,
              '',
              '---',
              '',
              '## Tags',
              '',
              tagList,
              '',
              '---',
              '',
              '*This report was auto-generated by GitHub Actions.*'
            ].join('\n');

            const filename = `LessonLearn/${date}_PR${prNumber}_${slug}.md`;
            const content = Buffer.from(report).toString('base64');

            try {
              await github.rest.repos.createOrUpdateFileContents({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: filename,
                message: `docs: Add tech report for PR #${prNumber}`,
                content: content,
                branch: 'main'
              });

              console.log(`Created tech report: ${filename}`);

              const successComment = [
                '## Tech Report Generated',
                '',
                `Tech report created: [\`${filename}\`](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/${filename})`,
                '',
                '### Next Steps',
                '- [ ] Add detailed learning points',
                '- [ ] Add reference links',
                '- [ ] Review tags',
                '',
                '---',
                '*Technical Writer Agent (GitHub Actions)*'
              ].join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: successComment
              });

            } catch (error) {
              console.error('Failed to create tech report:', error);

              const errorComment = [
                '## Tech Report Generation Failed',
                '',
                'Auto tech report generation failed.',
                'Please create a report manually in LessonLearn folder.',
                '',
                `Error: ${error.message}`
              ].join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: errorComment
              });
            }
